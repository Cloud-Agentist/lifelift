      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Cloud -->
  <path d="
    M 384 352
    L 144 352
    C 96 352, 56 312, 56 264
    C 56 224, 80 192, 116 180
    C 112 132, 148 96, 196 96
    C 232 96, 264 120, 276 152
    C 292 136, 316 128, 340 128
    C 400 128, 448 176, 448 232
